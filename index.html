<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CROWN CIRCUS - Schedule Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ==========================================
       1. THEME & VARIABLES (Circus & Crown)
       ========================================== */
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1f1f2e;
      --gold: #d4af37;
      --gold-dark: #aa8c2c;
      --text-color: #f1f1f5;
      --text-muted: #a0a0b0;
      --red: #c0392b;
      --red-hover: #e74c3c;
      --border-color: #3a3a4f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ==========================================
       2. STYLES (Header, Layout, Calendar, List)
       ========================================== */
    header {
      background: linear-gradient(135deg, #111, #222);
      border-bottom: 2px solid var(--gold);
      padding: 20px;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      color: var(--gold);
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .admin-btn-container {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn {
      background-color: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: var(--gold);
      color: var(--bg-color);
      box-shadow: 0 0 8px var(--gold);
    }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-danger:hover {
      background-color: var(--red);
      color: var(--text-color);
      box-shadow: 0 0 8px var(--red);
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 30px;
      flex-grow: 1;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .card-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* カレンダー表示 */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      text-align: center;
    }

    .calendar-header-day {
      color: var(--gold);
      font-weight: bold;
      padding: 10px 0;
      font-size: 0.9rem;
    }

    .calendar-day {
      background-color: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 4px;
      min-height: 90px;
      padding: 5px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .calendar-day:hover {
      background-color: rgba(255,255,255,0.08);
    }

    .calendar-day.empty {
      background-color: transparent;
      border: none;
      cursor: default;
    }

    .calendar-day .day-num {
      font-size: 0.85rem;
      font-weight: bold;
      color: var(--text-muted);
    }

    .calendar-day.today .day-num {
      color: var(--gold);
      text-shadow: 0 0 5px var(--gold);
    }

    .day-events {
      width: 100%;
      margin-top: 5px;
      overflow-y: auto;
      max-height: 60px;
    }

    .mini-event {
      font-size: 0.7rem;
      padding: 2px 4px;
      margin-bottom: 2px;
      border-radius: 2px;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    /* イベントリスト */
    .event-list {
      max-height: 500px;
      overflow-y: auto;
    }

    .list-item {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: relative;
      border-left: 4px solid var(--gold);
      margin-bottom: 8px;
      background-color: rgba(255,255,255,0.01);
      border-radius: 0 4px 4px 0;
    }

    .list-item-title {
      font-weight: bold;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 40px);
    }

    .list-item-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .list-item-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
      white-space: pre-wrap;
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: var(--card-bg);
      border: 1px solid var(--gold);
      border-radius: 8px;
      width: 90%;
      max-width: 500px;
      padding: 25px;
      box-shadow: 0 0 20px var(--gold);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--gold);
      margin-bottom: 5px;
    }

    .form-control {
      width: 100%;
      padding: 10px;
      background-color: rgba(0,0,0,0.3);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-color);
      font-family: inherit;
    }

    .form-control:focus {
      border-color: var(--gold);
      outline: none;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
  </style>
  
  <!-- ==========================================
     3. CONFIGURATION & APP STATE (JS)
     ========================================== -->
  <script>
    // 【必須】GASの「新しいデプロイ」で取得した最新のURL（https://script.google.com/～）をここに貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLB7p_dy9c8WRanffHBi2tzorNdtUqDxw5IeMfjDpBSCrK2tf7ualrdmZ0TewcOm-Zvw/exec";
  </script>
</head>
<body>

  <header>
    <h1>CROWN CIRCUS</h1>
    <p>Official Schedule Calendar</p>
    <div class="admin-btn-container">
      <button id="loginBtn" class="btn" onclick="toggleAdminMode()">管理者ログイン</button>
    </div>
  </header>

  <div class="container">
    <!-- カレンダーカード -->
    <div class="card">
      <div class="card-title">
        <span id="calendarTitle">CALENDAR</span>
        <div>
          <button class="btn" onclick="prevMonth()">&lt; 前月</button>
          <button class="btn" onclick="nextMonth()">次月 &gt;</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- リストカード -->
    <div class="card">
      <div class="card-title">
        <span>UPCOMING EVENTS</span>
        <button id="addEventBtn" class="btn" style="display: none;" onclick="openAddModal()">＋ 予定追加</button>
      </div>
      <div class="event-list" id="eventList">
        <p style="color: var(--text-muted); text-align: center; padding: 20px;">予定を読み込んでいます...</p>
      </div>
    </div>
  </div>

  <!-- イベント追加・編集モーダル -->
  <div id="eventModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="color: var(--gold); margin-bottom: 20px; font-family: 'Cinzel', serif;">EVENT FORM</h2>
      <form id="eventForm" onsubmit="saveEvent(event)">
        <input type="hidden" id="eventId">
        <div class="form-group">
          <label for="eventDate">日付</label>
          <input type="date" id="eventDate" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="eventTitle">イベントタイトル</label>
          <input type="text" id="eventTitle" class="form-control" placeholder="例: クラウン・特別ショー" required maxlength="30">
        </div>
        <div class="form-group">
          <label for="eventColor">カテゴリ（カラー）</label>
          <select id="eventColor" class="form-control">
            <option value="#ff4757">ショー開催 (赤)</option>
            <option value="#2ed573">コラボ企画 (緑)</option>
            <option value="#ffa502">ショップ物販 (橙)</option>
            <option value="#1e90ff">その他 (青)</option>
          </select>
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div>
            <label for="startTime">開始時間</label>
            <input type="text" id="startTime" class="form-control" placeholder="13:00" onblur="formatTime(this)">
          </div>
          <div>
            <label for="endTime">終了時間</label>
            <input type="text" id="endTime" class="form-control" placeholder="15:00" onblur="formatTime(this)">
          </div>
        </div>
        <div class="form-group">
          <label for="eventDesc">詳細内容</label>
          <textarea id="eventDesc" class="form-control" rows="4" placeholder="詳細を入力してください"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none; margin-right: auto;" onclick="deleteEvent()">削除</button>
          <button type="button" class="btn" onclick="closeModal()">キャンセル</button>
          <button type="button" class="btn" id="dupBtn" style="display: none;" onclick="duplicateEvent()">複製</button>
          <button type="submit" class="btn">保存する</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentDate = new Date();
    let events = [];
    let isAdmin = false;
    let savedPassword = ""; 

    window.onload = function() {
      fetchEvents();
    };

    // --- 1. データ取得 (GET) ---
    async function fetchEvents() {
      try {
        const response = await fetch(GAS_WEB_APP_URL);
        if (!response.ok) throw new Error("Network error");
        events = await response.json();
        renderCalendar();
        renderEventList();
      } catch (err) {
        console.error(err);
        alert("データの読み込みに失敗しました。GASのデプロイURLが正しいかご確認ください。");
      }
    }

    // --- 2. 管理者ログイン処理 ---
    function toggleAdminMode() {
      if (isAdmin) {
        isAdmin = false;
        savedPassword = "";
        document.getElementById("loginBtn").innerText = "管理者ログイン";
        document.getElementById("addEventBtn").style.display = "none";
        renderCalendar();
        renderEventList();
        alert("ログアウトしました。");
      } else {
        const pass = prompt("管理者パスワードを入力してください:");
        if (pass) {
          isAdmin = true;
          savedPassword = pass;
          document.getElementById("loginBtn").innerText = "ログアウト";
          document.getElementById("addEventBtn").style.display = "block";
          renderCalendar();
          renderEventList();
          alert("管理者としてログインしました。(保存時に検証されます)");
        }
      }
    }

    // --- 3. カレンダー描画 ---
    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById("calendarTitle").innerText = `${year}年 ${month + 1}月`;

      const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
      dayNames.forEach(d => {
        const div = document.createElement("div");
        div.className = "calendar-header-day";
        div.innerText = d;
        grid.appendChild(div);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "calendar-day empty";
        grid.appendChild(empty);
      }

      const today = new Date();
      for (let day = 1; day <= lastDate; day++) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "calendar-day";
        
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        
        if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
          dayDiv.classList.add("today");
        }

        const dayNumSpan = document.createElement("span");
        dayNumSpan.className = "day-num";
        dayNumSpan.innerText = day;
        dayDiv.appendChild(dayNumSpan);

        const dayEventsContainer = document.createElement("div");
        dayEventsContainer.className = "day-events";
        
        const filtered = events.filter(e => e.date === dateStr);
        filtered.forEach(ev => {
          const mEv = document.createElement("div");
          mEv.className = "mini-event";
          mEv.style.backgroundColor = ev.color || "#1e90ff";
          mEv.innerText = ev.title.length > 7 ? ev.title.substring(0, 7) + ".." : ev.title;
          dayEventsContainer.appendChild(mEv);
        });
        
        dayDiv.appendChild(dayEventsContainer);

        dayDiv.onclick = () => {
          if (isAdmin) {
            openAddModal(dateStr);
          } else if (filtered.length > 0) {
            alert(`【${filtered[0].title}】\n時間: ${filtered[0].startTime || '未定'}〜${filtered[0].endTime || '未定'}\n内容: ${filtered[0].description || 'なし'}`);
          }
        };

        grid.appendChild(dayDiv);
      }
    }

    // --- 4. リスト描画 ---
    function renderEventList() {
      const list = document.getElementById("eventList");
      list.innerHTML = "";

      const sortedEvents = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));

      if (sortedEvents.length === 0) {
        list.innerHTML = `<p style="color: var(--text-muted); text-align: center; padding: 20px;">登録された予定はありません。</p>`;
        return;
      }

      sortedEvents.forEach(ev => {
        const item = document.createElement("div");
        item.className = "list-item";
        item.style.borderLeftColor = ev.color || "#1e90ff";

        const timeStr = `${ev.startTime || '--:--'} 〜 ${ev.endTime || '--:--'}`;

        item.innerHTML = `
          <div class="list-item-title" title="${ev.title}">${ev.title}</div>
          <div class="list-item-time">${ev.date} | ${timeStr}</div>
          ${ev.description ? `<div class="list-item-desc">${ev.description}</div>` : ""}
        `;

        if (isAdmin) {
          item.style.cursor = "pointer";
          item.onclick = () => openEditModal(ev);
        }

        list.appendChild(item);
      });
    }

    // --- 5. モーダル制御 ---
    function openAddModal(dateStr = "") {
      document.getElementById("modalTitle").innerText = "CREATE EVENT";
      document.getElementById("eventId").value = "id_" + Date.now();
      document.getElementById("eventDate").value = dateStr || new Date().toISOString().split('T')[0];
      document.getElementById("eventTitle").value = "";
      document.getElementById("eventColor").value = "#ff4757";
      document.getElementById("startTime").value = "";
      document.getElementById("endTime").value = "";
      document.getElementById("eventDesc").value = "";
      
      document.getElementById("deleteBtn").style.display = "none";
      document.getElementById("dupBtn").style.display = "none";
      document.getElementById("eventModal").style.display = "flex";
    }

    function openEditModal(eventObj) {
      document.getElementById("modalTitle").innerText = "EDIT EVENT";
      document.getElementById("eventId").value = eventObj.id;
      document.getElementById("eventDate").value = eventObj.date;
      document.getElementById("eventTitle").value = eventObj.title;
      document.getElementById("eventColor").value = eventObj.color || "#ff4757";
      document.getElementById("startTime").value = eventObj.startTime || "";
      document.getElementById("endTime").value = eventObj.endTime || "";
      document.getElementById("eventDesc").value = eventObj.description || "";

      document.getElementById("deleteBtn").style.display = "inline-block";
      document.getElementById("dupBtn").style.display = "inline-block";
      document.getElementById("eventModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("eventModal").style.display = "none";
    }

    // --- 6. 時間フォーマット ---
    function formatTime(input) {
      let val = input.value.replace(/[^0-9]/g, "");
      if (val.length === 3) val = "0" + val;
      if (val.length === 4) {
        const h = val.substring(0, 2);
        const m = val.substring(2, 4);
        if (parseInt(h) < 24 && parseInt(m) < 60) {
          input.value = `${h}:${m}`;
        }
      }
    }

    // --- 7. 保存 ---
    async function saveEvent(e) {
      e.preventDefault();

      const eventData = {
        id: document.getElementById("eventId").value,
        date: document.getElementById("eventDate").value,
        title: document.getElementById("eventTitle").value,
        color: document.getElementById("eventColor").value,
        startTime: document.getElementById("startTime").value,
        endTime: document.getElementById("endTime").value,
        description: document.getElementById("eventDesc").value
      };

      const payload = {
        password: savedPassword,
        action: "save",
        event: eventData
      };

      await sendToGAS(payload, "保存が完了しました！");
    }

    // --- 8. 削除 ---
    async function deleteEvent() {
      if (!confirm("このイベントを削除してもよろしいですか？")) return;

      const payload = {
        password: savedPassword,
        action: "delete",
        event: { id: document.getElementById("eventId").value }
      };

      await sendToGAS(payload, "削除しました。");
    }

    // --- 9. 複製 ---
    function duplicateEvent() {
      document.getElementById("eventId").value = "id_" + Date.now();
      document.getElementById("modalTitle").innerText = "CREATE EVENT (DUPLICATED)";
      document.getElementById("deleteBtn").style.display = "none";
      document.getElementById("dupBtn").style.display = "none";
      alert("現在のデータをコピーしました。保存ボタンを押すと新規登録されます。");
    }

    // --- 10. 通信処理 ---
    async function sendToGAS(payload, successMessage) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Network error");
        const result = await response.json();

        if (result.status === "success") {
          alert(successMessage);
          closeModal();
          fetchEvents();
        } else {
          alert(result.message || "エラーが発生しました。");
        }
      } catch (err) {
        console.error(err);
        alert("通信エラーが発生しました。");
      }
    }

    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }
    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }
  </script>
</body>
</html>
