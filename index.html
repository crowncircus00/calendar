<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👑 CROWN CIRCUS 🎪 Schedule Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- ==========================================
     1. CONFIGURATION & APP STATE (JS)
     ========================================== -->
  <script>
    // 【必須】GASのデプロイURLをここに貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLB7p_dy9c8WRanffHBi2tzorNdtUqDxw5IeMfjDpBSCrK2tf7ualrdmZ0TewcOm-Zvw/exec";
  </script>

  <style>
    /* ==========================================
       2. THEME & VARIABLES
       ========================================== --> */
    :root {
      --bg-color: #0f0a1c; 
      --card-bg: #1c1430; 
      --gold: #fcd34d; 
      --gold-dark: #d97706;
      --text-color: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: #3b2e5a;
      
      --color-iriam: #4fc3f7;   
      --color-youtube: #ff4d4d; 
      --color-request: #ff8da1; 
      --color-personal: #b388ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(179, 136, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(252, 211, 77, 0.1) 0%, transparent 50%);
      color: var(--text-color);
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(180deg, #180933 0%, #0f0a1c 100%);
      border-bottom: 3px double var(--gold);
      padding: 25px 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    header::after {
      content: "🎪 🌟 🎪 🌟 🎪 🌟 🎪 🌟 🎪";
      display: block;
      font-size: 1.2rem;
      letter-spacing: 8px;
      margin-top: 8px;
      opacity: 0.8;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      color: var(--gold);
      letter-spacing: 6px;
      text-shadow: 0 0 15px rgba(252, 211, 77, 0.6), 0 0 2px #fff;
    }

    header p {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 5px;
      letter-spacing: 2px;
    }

    .admin-btn-container {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn {
      background-color: rgba(28, 20, 48, 0.8);
      border: 1.5px solid var(--gold);
      color: var(--gold);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .btn:hover {
      background-color: var(--gold);
      color: #0f0a1c;
      box-shadow: 0 0 12px var(--gold);
      transform: scale(1.05);
    }

    .btn-danger { border-color: #ff4d4d; color: #ff4d4d; }
    .btn-danger:hover { background-color: #ff4d4d; color: var(--text-color); box-shadow: 0 0 12px #ff4d4d; }
    .btn-secondary { border-color: #10b981; color: #10b981; }
    .btn-secondary:hover { background-color: #10b981; color: #0f0a1c; box-shadow: 0 0 12px #10b981; }

    .container {
      max-width: 1650px; 
      width: 95%;        
      margin: 20px auto;
      padding: 0 10px;
      display: grid;
      grid-template-columns: 1.4fr 0.6fr; 
      gap: 24px;
      flex-grow: 1;
    }

    @media (max-width: 1200px) {
      .container { grid-template-columns: 1fr; }
    }

    .card {
      background-color: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .card::before {
      content: "✦";
      position: absolute;
      top: 10px;
      left: 10px;
      color: var(--gold);
      font-size: 1rem;
      opacity: 0.5;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      border-bottom: 2px dashed var(--border-color);
      padding-bottom: 12px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.4rem;
      letter-spacing: 2px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }

    .filter-tab {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-tab.active {
      background-color: var(--gold);
      color: #0f0a1c;
      border-color: var(--gold);
      font-weight: bold;
    }

    /* ==========================================
       3. 一本の帯表示に対応したカレンダー構造
       ========================================== --> */
    .calendar-wrapper {
      position: relative;
      width: 100%;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .calendar-header-day {
      color: var(--gold);
      font-weight: bold;
      padding: 8px 0;
      font-size: 1rem;
      border-bottom: 2px solid var(--border-color);
    }

    /* 週（行）ごとのまとまりを作る */
    .calendar-week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      position: relative; /* 帯を絶対配置するための基準 */
      border-bottom: 1px solid var(--border-color);
    }

    .calendar-day {
      background-color: rgba(255,255,255,0.01);
      border-right: 1px solid rgba(59, 46, 90, 0.5);
      min-height: 140px; 
      padding: 6px;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
    }
    .calendar-week-row .calendar-day:last-child {
      border-right: none;
    }

    .calendar-day:hover {
      background-color: rgba(179, 136, 255, 0.04);
    }

    .calendar-day.empty {
      background-color: transparent;
      cursor: default;
    }

    .calendar-day .day-num {
      font-size: 1rem;
      font-weight: bold;
      color: var(--text-muted);
      margin-bottom: 30px; /* 予定の帯エリアを確保するためスペースを開ける */
    }

    .calendar-day.today {
      background-color: rgba(252, 211, 77, 0.04);
      box-shadow: inset 0 0 8px rgba(252, 211, 77, 0.15);
    }
    .calendar-day.today .day-num {
      color: var(--gold);
    }

    /* 予定の帯エリア（週の行の中に浮かせる） */
    .week-events-container {
      position: absolute;
      top: 38px; /* 日付数字の下から配置 */
      left: 0;
      width: 100%;
      height: calc(100% - 42px);
      pointer-events: none; /* 下の日付セルをクリックできるように透過 */
      display: flex;
      flex-direction: column;
      gap: 4px; /* 帯と帯の上下の隙間 */
      padding: 0 2px;
    }

    /* 繋がった一本の帯の基本スタイル */
    .connected-event-bar {
      position: absolute;
      height: 22px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #0f0a1c !important;
      padding: 2px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      cursor: pointer;
      pointer-events: auto; /* 帯自体はクリック可能にする */
      z-index: 10;
      transition: transform 0.1s ease;
    }
    .connected-event-bar:hover {
      transform: scaleY(1.05);
      filter: brightness(1.1);
    }

    /* 途切れる端の調整用クラス */
    .bar-not-start { border-top-left-radius: 0; border-bottom-left-radius: 0; opacity: 0.9; }
    .bar-not-end { border-top-right-radius: 0; border-bottom-right-radius: 0; opacity: 0.9; }

    .event-list {
      max-height: 600px;
      overflow-y: auto;
      padding-right: 5px;
      flex-grow: 1;
    }

    .list-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
      position: relative;
      border-left: 5px solid var(--gold);
      margin-bottom: 8px;
      background-color: rgba(255,255,255,0.02);
      border-radius: 0 6px 6px 0;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-item:hover {
      background-color: rgba(255,255,255,0.05);
      transform: translateX(4px);
    }

    .list-item-left { flex: 1; min-width: 0; padding-right: 15px; }
    .list-item-title { font-weight: bold; color: #fff; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item-right-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
    .list-item-date { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
    .list-item-time { font-size: 0.85rem; color: var(--gold); font-weight: bold; white-space: nowrap; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(15, 10, 28, 0.85); backdrop-filter: blur(5px);
      justify-content: center; align-items: center; z-index: 1000;
    }

    .modal-content {
      background-color: var(--card-bg); border: 2px solid var(--gold); border-radius: 12px;
      width: 90%; max-width: 500px; padding: 30px; box-shadow: 0 0 30px rgba(252, 211, 77, 0.3); position: relative;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--gold); margin-bottom: 6px; font-weight: bold; }
    .form-control { width: 100%; padding: 12px; background-color: rgba(0,0,0,0.4); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); font-family: inherit; font-size: 0.95rem; }
    .form-control:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 8px rgba(252, 211, 77, 0.3); }
    .modal-actions { display: flex; justify-content: flex-end; flex-wrap: wrap; gap: 12px; margin-top: 25px; }
  </style>
</head>
<body>

  <header>
    <h1>👑 CROWN CIRCUS 🎪</h1>
    <p>Official Schedule Calendar</p>
    <div class="admin-btn-container">
      <button id="loginBtn" class="btn" onclick="toggleAdminMode()">🔑 管理者ログイン</button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title">
        <span id="calendarTitle">🌟 CALENDAR</span>
        <div>
          <button class="btn" onclick="prevMonth()">🎪 前月</button>
          <button class="btn" onclick="nextMonth()">次月 🎪</button>
        </div>
      </div>
      <div class="calendar-wrapper">
        <!-- 曜日ヘッダー用グリッド -->
        <div class="calendar-grid" id="calendarHeaderGrid"></div>
        <!-- 日付と横帯を展開するメインコンテナ -->
        <div id="calendarMainContainer"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>✨ UPCOMING</span>
        <button id="addEventBtn" class="btn" style="display: none;" onclick="openAddModal()">＋ 予定追加</button>
      </div>
      
      <div class="filter-bar" id="filterBar">
        <button class="filter-tab active" onclick="filterCategory('all')">すべて</button>
        <button class="filter-tab" onclick="filterCategory('#4fc3f7')">🌐 IRIAM</button>
        <button class="filter-tab" onclick="filterCategory('#ff4d4d')">🎥 YouTube</button>
        <button class="filter-tab" onclick="filterCategory('#ff8da1')">💌 ご依頼</button>
        <button class="filter-tab" onclick="filterCategory('#b388ff')">👑 個人予定</button>
      </div>

      <div class="event-list" id="eventList">
        <p style="color: var(--text-muted); text-align: center; padding: 20px;">🎪 予定を賑やかに準備中...</p>
      </div>
    </div>
  </div>

  <!-- モーダル省略なし -->
  <div id="eventModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="color: var(--gold); margin-bottom: 20px; font-family: 'Cinzel', serif; text-align: center; letter-spacing: 2px;">🎪 CREATE EVENT</h2>
      <form id="eventForm" onsubmit="saveEvent(event)">
        <input type="hidden" id="eventId">
        
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div>
            <label for="eventDate">開始日</label>
            <input type="date" id="eventDate" class="form-control" required onchange="syncEndDate(this.value)">
          </div>
          <div>
            <label for="eventEndDate">終了日</label>
            <input type="date" id="eventEndDate" class="form-control" required>
          </div>
        </div>

        <div class="form-group">
          <label for="eventTitle">イベントタイトル</label>
          <input type="text" id="eventTitle" class="form-control" placeholder="例: クラウン・特別ショー" required maxlength="30">
        </div>

        <div class="form-group">
          <label for="eventColor">カテゴリー</label>
          <select id="eventColor" class="form-control">
            <option value="#4fc3f7">🌐 IRIAM</option>
            <option value="#ff4d4d">🎥 YouTube</option>
            <option value="#ff8da1">💌 ご依頼</option>
            <option value="#b388ff">👑 個人予定</option>
          </select>
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div>
            <label for="startTime">開始時間</label>
            <input type="text" id="startTime" class="form-control" placeholder="13:00" onblur="formatTime(this)">
          </div>
          <div>
            <label for="endTime">終了時間</label>
            <input type="text" id="endTime" class="form-control" placeholder="15:00" onblur="formatTime(this)">
          </div>
        </div>

        <div class="form-group">
          <label for="eventDesc">詳細内容</label>
          <textarea id="eventDesc" class="form-control" rows="4" placeholder="詳細を入力してください"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none; margin-right: auto;" onclick="deleteEvent()">🗑️ 削除</button>
          <button type="button" class="btn btn-secondary" id="dupToOtherDayBtn" style="display: none;" onclick="openDuplicateMenu()">🔁 繰り返し複製</button>
          <button type="button" class="btn" onclick="closeModal()">キャンセル</button>
          <button type="submit" class="btn">✨ 保存する</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentDate = new Date();
    let events = [];
    let isAdmin = false;
    let savedPassword = ""; 
    let activeFilter = "all";

    window.onload = function() {
      fetchEvents();
    };

    function cleanDateStr(dateVal) {
      if (!dateVal) return "";
      let str = String(dateVal).trim();
      if (str.includes("T") || str.includes("Z") || str.includes("+")) {
        try {
          const d = new Date(str);
          if (!isNaN(d.getTime())) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
          }
        } catch(e) {}
      }
      return /^\d{4}/.test(str) ? str.substring(0, 10) : str;
    }

    function formatToShortDate(dateVal, endDateVal) {
      const start = cleanDateStr(dateVal);
      const end = cleanDateStr(endDateVal || dateVal);
      const toMd = (s) => {
        if (!s) return "";
        const parts = s.split("-");
        return parts.length === 3 ? `${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}` : s;
      };
      return (start && end && start !== end) ? `${toMd(start)}〜${toMd(end)}` : toMd(start);
    }

    function cleanTime(timeVal) {
      if (!timeVal) return "";
      let str = String(timeVal).trim();
      if (str.includes("T")) {
        try {
          const d = new Date(str);
          if (!isNaN(d.getTime())) {
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
          }
        } catch(e) {}
      }
      return (str.match(/:/g) || []).length === 2 ? str.substring(0, 5) : str;
    }

    function getTimeRangeString(start, end) {
      const cleanStart = cleanTime(start);
      const cleanEnd = cleanTime(end);
      if (cleanStart && cleanEnd) return `${cleanStart}〜${cleanEnd}`;
      if (cleanStart) return `${cleanStart}〜`;
      if (cleanEnd) return `〜${cleanEnd}`;
      return "未定";
    }

    function getGenreName(colorCode) {
      switch(colorCode) {
        case "#4fc3f7": return "🌐 IRIAM";
        case "#ff4d4d": return "🎥 YouTube";
        case "#ff8da1": return "💌 ご依頼";
        case "#b388ff": return "👑 個人予定";
        default: return "✨ その他";
      }
    }

    function sortByTime(a, b) {
      return (cleanTime(a.startTime) || "99:99").localeCompare(cleanTime(b.startTime) || "99:99");
    }

    async function fetchEvents() {
      try {
        const response = await fetch(GAS_WEB_APP_URL);
        if (!response.ok) throw new Error("Network error");
        events = await response.json();
        renderCalendar();
        renderEventList();
      } catch (err) {
        console.error(err);
        alert("データの読み込みに失敗しました。");
      }
    }

    function toggleAdminMode() {
      if (isAdmin) {
        isAdmin = false; savedPassword = "";
        document.getElementById("loginBtn").innerText = "🔑 管理者ログイン";
        document.getElementById("addEventBtn").style.display = "none";
      } else {
        const pass = prompt("管理者パスワードを入力してください:");
        if (pass) {
          isAdmin = true; savedPassword = pass;
          document.getElementById("loginBtn").innerText = "🚪 ログアウト";
          document.getElementById("addEventBtn").style.display = "block";
        }
      }
      renderCalendar(); renderEventList();
    }

    function syncEndDate(val) {
      const endDateInput = document.getElementById("eventEndDate");
      if (!endDateInput.value || endDateInput.value < val) endDateInput.value = val;
    }

    // ==========================================
    // 💡 修正の核心：週をまたぐ綺麗な「一本の横帯」を描画するロジック
    // ==========================================
    function renderCalendar() {
      const headerGrid = document.getElementById("calendarHeaderGrid");
      const mainContainer = document.getElementById("calendarMainContainer");
      
      headerGrid.innerHTML = "";
      mainContainer.innerHTML = "";

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById("calendarTitle").innerText = `🎪 ${year}年 ${month + 1}月 🎪`;

      // 曜日ヘッダー
      ["日", "月", "火", "水", "木", "金", "土"].forEach(d => {
        const div = document.createElement("div");
        div.className = "calendar-header-day";
        div.innerText = d;
        headerGrid.appendChild(div);
      });

      const firstDayNum = new Date(year, month, 1).getDay();
      const lastDateNum = new Date(year, month + 1, 0).getDate();

      // カレンダーに表示する全日付マトリックスを生成
      let allDaysArray = [];
      
      // 前月の空白埋め部分
      for (let i = 0; i < firstDayNum; i++) {
        allDaysArray.push({ type: "empty", dateStr: "" });
      }
      // 今月の日付部分
      const today = new Date();
      for (let day = 1; day <= lastDateNum; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = (year === today.getFullYear() && month === today.getMonth() && day === today.getDate());
        allDaysArray.push({ type: "day", dayNum: day, dateStr: dateStr, isToday: isToday });
      }
      // 次月の空白埋め（7の倍数になるように調整）
      while (allDaysArray.length % 7 !== 0) {
        allDaysArray.push({ type: "empty", dateStr: "" });
      }

      // イベントデータのフィルタリングと事前ソート
      let activeEvents = events.filter(e => {
        if (!e.date) return false;
        const startD = cleanDateStr(e.date);
        const endD = cleanDateStr(e.endDate || e.date);
        const monthStart = `${year}-${String(month + 1).padStart(2, '0')}-01`;
        const monthEnd = `${year}-${String(month + 1).padStart(2, '0')}-${String(lastDateNum).padStart(2, '0')}`;
        const overlap = (startD <= monthEnd && endD >= monthStart);
        return activeFilter === "all" ? overlap : (overlap && e.color === activeFilter);
      });

      // 複数日予定を上に、時間はじまりを綺麗に並べるためのソート
      activeEvents.sort((a, b) => {
        const lenA = new Date(cleanDateStr(a.endDate || a.date)) - new Date(cleanDateStr(a.date));
        const lenB = new Date(cleanDateStr(b.endDate || b.date)) - new Date(cleanDateStr(b.date));
        if (lenB !== lenA) return lenB - lenA; // 長い予定を上に
        return sortByTime(a, b);
      });

      // 7日（1週間）ずつ行に区切ってレンダリング
      for (let rowStart = 0; rowStart < allDaysArray.length; rowStart += 7) {
        const weekDays = allDaysArray.slice(rowStart, rowStart + 7);
        
        // 週の行コンテナを作成
        const weekRow = document.createElement("div");
        weekRow.className = "calendar-week-row";

        // 日付セルを配置
        weekDays.forEach(dayObj => {
          const cell = document.createElement("div");
          if (dayObj.type === "empty") {
            cell.className = "calendar-day empty";
          } else {
            cell.className = "calendar-day" + (dayObj.isToday ? " today" : "");
            cell.innerHTML = `<span class="day-num">${dayObj.dayNum}</span>`;
            
            if (isAdmin) {
              cell.onclick = () => openAddModal(dayObj.dateStr);
            } else {
              cell.onclick = () => showDayAlert(dayObj.dateStr, activeEvents);
            }
          }
          weekRow.appendChild(cell);
        });

        // 💡 帯の重なり（縦位置のバッティング）を回避するためのトラック管理システム
        const eventTracks = []; 
        const weekEventsContainer = document.createElement("div");
        weekEventsContainer.className = "week-events-container";

        // この1週間の中にひっかかるイベントを探して帯として配置
        activeEvents.forEach(ev => {
          const evStart = cleanDateStr(ev.date);
          const evEnd = cleanDateStr(ev.endDate || ev.date);

          // 週の開始日と終了日を取得
          const weekStartStr = weekDays.find(d => d.dateStr)?.dateStr;
          const weekEndStr = [...weekDays].reverse().find(d => d.dateStr)?.dateStr;
          if (!weekStartStr || !weekEndStr) return;

          // イベントがこの週に被っているか判定
          if (evStart <= weekEndStr && evEnd >= weekStartStr) {
            // 週の中での「開始位置（何番目のセルか）」と「滞在日数」を算出
            let startIndex = weekDays.findIndex(d => d.dateStr && d.dateStr === evStart);
            if (startIndex === -1) startIndex = weekDays.findIndex(d => d.dateStr !== ""); // 週をまたいで継続している場合

            let endIndex = weekDays.findIndex(d => d.dateStr && d.dateStr === evEnd);
            if (endIndex === -1) endIndex = 6; // 週の右端を抜けて翌週へ続く場合

            const daySpan = endIndex - startIndex + 1;

            // 重ならない空きレーン（トラック）を探す
            let trackIndex = 0;
            while (true) {
              if (!eventTracks[trackIndex]) {
                eventTracks[trackIndex] = Array(7).fill(false);
              }
              // 使用予定のセル領域が空いているか確認
              let isConflict = false;
              for (let i = startIndex; i <= endIndex; i++) {
                if (eventTracks[trackIndex][i]) { isConflict = true; break; }
              }
              if (!isConflict) {
                // 空いていればそのトラックを確保
                for (let i = startIndex; i <= endIndex; i++) eventTracks[trackIndex][i] = true;
                break;
              }
              trackIndex++; // 被っていたら一つ下のレーンへ
            }

            // 繋がった1本の帯オブジェクトを生成
            const bar = document.createElement("div");
            bar.className = "connected-event-bar";
            bar.style.backgroundColor = ev.color || "#b388ff";
            
            // 位置と幅の計算（%ベースでぴったり横に繋げる）
            bar.style.left = `calc(${(startIndex / 7) * 100}% + 4px)`;
            bar.style.width = `calc(${(daySpan / 7) * 100}% - 8px)`;
            bar.style.top = `${trackIndex * 26}px`; // トラックごとに一段ずつ下げる

            // 週の途切れ目の角丸デザイン調整
            if (evStart < weekDays[startIndex].dateStr) bar.classList.add("bar-not-start");
            if (evEnd > weekDays[endIndex].dateStr) bar.classList.add("bar-not-end");

            // テキスト表示（初日または週の左端のみに時間を表示してスッキリさせる）
            const cleanStart = cleanTime(ev.startTime);
            const isActualStart = (weekDays[startIndex].dateStr === evStart);
            const timePrefix = (cleanStart && isActualStart) ? `${cleanStart} ` : "";
            bar.innerText = `${timePrefix}${ev.title}`;

            // アクション紐付け
            bar.onclick = (e) => {
              e.stopPropagation();
              if (isAdmin) openEditModal(ev);
              else alert(`【ジャンル】: ${getGenreName(ev.color)}\n【時間】: ${getTimeRangeString(ev.startTime, ev.endTime)}\n【タイトル】: ${ev.title}\n【詳細】: ${ev.description || 'なし'}`);
            };

            weekEventsContainer.appendChild(bar);
          }
        });

        weekRow.appendChild(weekEventsContainer);
        mainContainer.appendChild(weekRow);
      }
    }

    function showDayAlert(dateStr, activeEvents) {
      let dayEvents = activeEvents.filter(e => {
        const s = cleanDateStr(e.date);
        const end = cleanDateStr(e.endDate || e.date);
        return dateStr >= s && dateStr <= end;
      });
      if (dayEvents.length > 0) {
        let details = dayEvents.map(e => `【${getGenreName(e.color)}】${getTimeRangeString(e.startTime, e.endTime)}\n👑 ${e.title}\n📝 ${e.description || '詳細なし'}`).join("\n\n🎪🎪\n\n");
        alert(details);
      }
    }

    function filterCategory(colorCode) {
      activeFilter = colorCode;
      document.querySelectorAll(".filter-tab").forEach(tab => tab.classList.remove("active"));
      event.target.classList.add("active");
      renderCalendar(); renderEventList();
    }

    function renderEventList() {
      const list = document.getElementById("eventList");
      list.innerHTML = "";
      let filtered = events.filter(ev => activeFilter === "all" ? true : ev.color === activeFilter);

      filtered.sort((a, b) => cleanDateStr(a.date).localeCompare(cleanDateStr(b.date)) || sortByTime(a, b));

      if (filtered.length === 0) {
        list.innerHTML = `<p style="color: var(--text-muted); text-align: center; padding: 20px;">🎪 該当する予定はありません。</p>`;
        return;
      }

      filtered.forEach(ev => {
        const item = document.createElement("div");
        item.className = "list-item";
        item.style.borderLeftColor = ev.color || "#b388ff";
        
        let icon = "✨ ";
        if (ev.color === "#4fc3f7") icon = "🌐 ";
        if (ev.color === "#ff4d4d") icon = "🎥 ";
        if (ev.color === "#ff8da1") icon = "💌 ";
        if (ev.color === "#b388ff") icon = "👑 ";

        item.innerHTML = `
          <div class="list-item-left">
            <div class="list-item-title" title="${ev.title}">${icon}${ev.title}</div>
          </div>
          <div class="list-item-right-info">
            <div class="list-item-date">📅 ${formatToShortDate(ev.date, ev.endDate)}</div>
            <div class="list-item-time">⏰ ${getTimeRangeString(ev.startTime, ev.endTime)}</div>
          </div>
        `;
        item.style.cursor = "pointer";
        item.onclick = () => {
          if (isAdmin) openEditModal(ev);
          else alert(`【ジャンル】: ${getGenreName(ev.color)}\n【時間】: ${getTimeRangeString(ev.startTime, ev.endTime)}\n【タイトル】: ${ev.title}\n【詳細】: ${ev.description || 'なし'}`);
        };
        list.appendChild(item);
      });
    }

    function openAddModal(dateStr = "") {
      const defaultDate = dateStr || new Date().toISOString().split('T')[0];
      document.getElementById("modalTitle").innerText = "🎪 CREATE EVENT";
      document.getElementById("eventId").value = "id_" + Date.now();
      document.getElementById("eventDate").value = defaultDate;
      document.getElementById("eventEndDate").value = defaultDate;
      document.getElementById("eventTitle").value = "";
      document.getElementById("eventColor").value = "#4fc3f7";
      document.getElementById("startTime").value = "";
      document.getElementById("endTime").value = "";
      document.getElementById("eventDesc").value = "";
      document.getElementById("deleteBtn").style.display = "none";
      document.getElementById("dupToOtherDayBtn").style.display = "none";
      document.getElementById("eventModal").style.display = "flex";
    }

    function openEditModal(eventObj) {
      document.getElementById("modalTitle").innerText = "🎪 EDIT EVENT";
      document.getElementById("eventId").value = eventObj.id;
      document.getElementById("eventDate").value = cleanDateStr(eventObj.date);
      document.getElementById("eventEndDate").value = cleanDateStr(eventObj.endDate || eventObj.date);
      document.getElementById("eventTitle").value = eventObj.title;
      document.getElementById("eventColor").value = eventObj.color || "#4fc3f7";
      document.getElementById("startTime").value = cleanTime(eventObj.startTime);
      document.getElementById("endTime").value = cleanTime(eventObj.endTime);
      document.getElementById("eventDesc").value = eventObj.description || "";
      document.getElementById("deleteBtn").style.display = "inline-block";
      document.getElementById("dupToOtherDayBtn").style.display = "inline-block";
      document.getElementById("eventModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("eventModal").style.display = "none"; }

    function formatTime(input) {
      let val = input.value.replace(/[^0-9]/g, "");
      if (val.length === 3) val = "0" + val;
      if (val.length === 4) {
        const h = val.substring(0, 2); const m = val.substring(2, 4);
        if (parseInt(h) < 24 && parseInt(m) < 60) input.value = `${h}:${m}`;
      }
    }

    async function saveEvent(e) {
      if (e) e.preventDefault();
      const eventData = {
        id: document.getElementById("eventId").value,
        date: document.getElementById("eventDate").value,
        endDate: document.getElementById("eventEndDate").value,
        title: document.getElementById("eventTitle").value,
        color: document.getElementById("eventColor").value,
        startTime: cleanTime(document.getElementById("startTime").value),
        endTime: cleanTime(document.getElementById("endTime").value),
        description: document.getElementById("eventDesc").value
      };
      await sendToGAS({ password: savedPassword, action: "save", event: eventData }, "保存が完了しました！🎪");
    }

    async function openDuplicateMenu() {
      const baseDateStr = document.getElementById("eventDate").value;
      const baseEndDateStr = document.getElementById("eventEndDate").value || baseDateStr;
      if (!baseDateStr) return;
      
      const baseDate = new Date(baseDateStr);
      const baseEndDate = new Date(baseEndDateStr);
      const daySpan = Math.round((baseEndDate - baseDate) / (1000 * 60 * 60 * 24));
      const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
      const menuMsg = `🤖 繰り返し方法を選択してください:\n1: 別日指定一括複製\n2: 毎週 [${dayNames[baseDate.getDay()]}曜日]\n3: 翌日から7日間連続\n4: カスタム間隔`;

      const choice = prompt(menuMsg, "1");
      if (!choice) return;

      const title = document.getElementById("eventTitle").value;
      const color = document.getElementById("eventColor").value;
      const startTime = cleanTime(document.getElementById("startTime").value);
      const endTime = cleanTime(document.getElementById("endTime").value);
      const description = document.getElementById("eventDesc").value;
      let duplicatePayloads = [];

      if (choice === "1") {
        const targetDate = prompt("複製先の「開始日」を入力してください:", baseDateStr);
        if (!targetDate) return;
        let newStart = new Date(targetDate); let newEnd = new Date(newStart); newEnd.setDate(newStart.getDate() + daySpan);
        duplicatePayloads.push({ id: "id_" + Date.now() + "_0", date: targetDate, endDate: newEnd.toISOString().split("T")[0], title, color, startTime, endTime, description });
      } else if (choice === "2") {
        const count = parseInt(prompt("何週繰り返しますか？(最大20)", "4"), 10);
        if (isNaN(count) || count <= 0) return;
        for (let i = 1; i <= count; i++) {
          let nStart = new Date(baseDate); nStart.setDate(baseDate.getDate() + (i * 7));
          let nEnd = new Date(nStart); nEnd.setDate(nStart.getDate() + daySpan);
          duplicatePayloads.push({ id: `id_${Date.now()}_w_${i}`, date: nStart.toISOString().split("T")[0], endDate: nEnd.toISOString().split("T")[0], title, color, startTime, endTime, description });
        }
      } else if (choice === "3") {
        for (let i = 1; i <= 7; i++) {
          let nStart = new Date(baseDate); nStart.setDate(baseDate.getDate() + i);
          let nEnd = new Date(nStart); nEnd.setDate(nStart.getDate() + daySpan);
          duplicatePayloads.push({ id: `id_${Date.now()}_7d_${i}`, date: nStart.toISOString().split("T")[0], endDate: nEnd.toISOString().split("T")[0], title, color, startTime, endTime, description });
        }
      } else if (choice === "4") {
        const unit = prompt("単位 (d: 日 / w: 週 / m: 月)", "d");
        const interval = parseInt(prompt("間隔数値", "2"), 10);
        const count = parseInt(prompt("回数 (最大20)", "5"), 10);
        if(isNaN(interval) || isNaN(count)) return;
        for (let i = 1; i <= count; i++) {
          let nStart = new Date(baseDate);
          if (unit === "d") nStart.setDate(baseDate.getDate() + (i * interval));
          if (unit === "w") nStart.setDate(baseDate.getDate() + (i * interval * 7));
          if (unit === "m") nStart.setMonth(baseDate.getMonth() + (i * interval));
          let nEnd = new Date(nStart); nEnd.setDate(nStart.getDate() + daySpan);
          duplicatePayloads.push({ id: `id_${Date.now()}_custom_${i}`, date: nStart.toISOString().split("T")[0], endDate: nEnd.toISOString().split("T")[0], title, color, startTime, endTime, description });
        }
      }

      if (duplicatePayloads.length > 0) {
        let successCount = 0;
        for (const targetEvent of duplicatePayloads) {
          try {
            const res = await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ password: savedPassword, action: "save", event: targetEvent }) });
            const resJson = await res.json();
            if (resJson.status === "success") successCount++;
          } catch (e) {}
        }
        alert(`🔁 繰り返し一括登録が終了しました！（成功: ${successCount} 件）`);
        closeModal(); fetchEvents();
      }
    }

    async function deleteEvent() {
      if (!confirm("このイベントを削除してもよろしいですか？")) return;
      await sendToGAS({ password: savedPassword, action: "delete", event: { id: document.getElementById("eventId").value } }, "削除しました。");
    }

    async function sendToGAS(payload, successMessage) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await response.json();
        if (result.status === "success") {
          alert(successMessage); closeModal(); fetchEvents();
        } else {
          alert(result.message || "エラーが発生しました。");
        }
      } catch (err) {
        alert("通信エラーが発生しました。");
      }
    }

    function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
  </script>
